name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write  # PyPI Trusted Publishing

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -e ".[dev]"
      - name: Lint
        run: ruff check src/ tests/
      - name: Type check
        run: mypy src/ --strict
      - name: Run tests
        run: pytest tests/ -v --tb=short --cov --cov-report=term-missing
      - name: Coverage threshold
        run: coverage report --fail-under=80
      - name: Security scan
        run: bandit -r src/ -ll

  release:
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            CHANGES=$(git log --pretty=format:"- %s (%h)" HEAD)
          else
            CHANGES=$(git log --pretty=format:"- %s (%h)" ${PREV_TAG}..HEAD)
          fi
          echo "changes<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: |
            ## Changes

            ${{ steps.changelog.outputs.changes }}
          generate_release_notes: true

  publish:
    runs-on: ubuntu-latest
    needs: validate
    environment:
      name: pypi
      url: https://pypi.org/p/miner-harness
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install uv
        run: pip install uv
      - name: Build
        run: uv build
      - name: Publish to PyPI
        run: uv publish
        env:
          # Se configurado, usa API token. Caso contrário, uv usa Trusted Publishing (OIDC).
          UV_PUBLISH_TOKEN: ${{ secrets.PYPI_API_TOKEN }}
